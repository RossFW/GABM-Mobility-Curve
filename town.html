<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GABM Mobility Curve — Dewberry Hollow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- Load order matters -->
  <script src="papaparse.min.js"></script>
  <script src="config.js"></script>
  <script src="phaser.min.js"></script>
  <script src="map-layout.js"></script>
  <script src="agent-schedule.js"></script>
  <script src="town-render.js"></script>
  <script src="town-pathfinding.js"></script>
  <script src="town-agents.js"></script>
  <script src="town-ui.js"></script>
  <script src="nav.js" defer></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      justify-content: center;
      padding: 16px 16px 40px;
      min-height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 1160px;
    }

    /* ─── Header: Model info prominent ─────────────────── */
    #header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 4px 12px;
      border-bottom: 2px solid #1e2d40;
    }

    #header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    #world-name  { font-size: 11px; letter-spacing: 3px; color: #e2e8f0; }
    #subtitle    { font-size: 6px; color: #4a6580; letter-spacing: 2px; }

    #model-display {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 12px;
      background: #0d1520;
      border: 1px solid #1e2d40;
      border-radius: 4px;
    }

    #current-model-name {
      font-size: 14px;
      color: #3B82F6;
      letter-spacing: 2px;
    }

    #current-model-detail {
      font-size: 7px;
      color: #4a6580;
    }

    #infection-level {
      font-size: 12px;
      color: #F97316;
      letter-spacing: 1px;
    }

    #agent-counts {
      font-size: 9px;
      color: #7a9ab8;
    }

    /* ─── Model selector ─────────────────────────────── */
    #model-selector-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 4px;
    }

    #model-selector-row label {
      font-size: 6px;
      color: #4a6580;
      letter-spacing: 1px;
    }

    #model-select {
      background: #0d1520;
      color: #c8d8e8;
      border: 1px solid #2d3748;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 4px 8px;
      cursor: pointer;
      flex: 1;
      max-width: 500px;
    }

    #model-select optgroup { font-size: 7px; color: #7a9ab8; }
    #model-select option { font-size: 7px; }

    /* ─── Game + Bio layout ──────────────────────────── */
    #game-row {
      display: flex;
      align-items: flex-start;
    }

    #game-container canvas {
      cursor: default;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #1e2d40;
    }

    #bio-panel {
      width: 200px;
      min-height: 640px;
      background: #0d1520;
      border: 1px solid #1e2d40;
      border-left: none;
      padding: 16px 14px;
      font-size: 6px;
      color: #4a6580;
      line-height: 2.2;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .bio-placeholder {
      font-size: 6px;
      color: #4a6580;
      text-align: center;
      padding-top: 60px;
      line-height: 2.8;
    }

    .bio-name {
      font-size: 8px;
      color: #e2e8f0;
      margin-bottom: 6px;
      letter-spacing: 1px;
      word-break: break-word;
    }
    .bio-meta  { font-size: 5px; color: #7a9ab8; margin-bottom: 10px; }
    .bio-traits {
      font-size: 5px;
      color: #4a6580;
      margin-bottom: 10px;
      line-height: 2;
    }
    .trait {
      background: #141e2e;
      border: 1px solid #1e2d40;
      padding: 1px 4px;
      font-size: 5px;
      display: inline-block;
      margin: 1px;
      line-height: 2;
    }
    .bio-decision { font-size: 7px; margin-bottom: 12px; }
    .bio-reasoning-label {
      font-size: 5px;
      color: #3a5068;
      letter-spacing: 2px;
      margin-bottom: 6px;
      border-top: 1px solid #1e2d40;
      padding-top: 10px;
    }
    .bio-reasoning { font-size: 5px; color: #7a9ab8; line-height: 2.4; word-break: break-word; }

    /* ─── Controls ───────────────────────────────────── */
    #controls {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 4px;
      border-top: 1px solid #1e2d40;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #0e1520;
      color: #c8d8e8;
      border: 1px solid #2d3748;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 5px 9px;
      cursor: pointer;
      transition: background 0.1s;
      line-height: 1;
    }
    .ctrl-btn:hover  { background: #1a2a3a; color: #fff; }
    .ctrl-btn:active { background: #243040; }
    #btn-play-pause  { border-color: #1a3a5a; color: #4895EF; }
    #btn-play-pause:hover { background: #0d1a2a; }

    #speed-group {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    #speed-label { font-size: 5px; color: #4a6580; margin-right: 2px; }

    .speed-btn {
      background: #0a0f18;
      color: #4a6580;
      border: 1px solid #1e2d40;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 4px 7px;
      cursor: pointer;
    }
    .speed-btn.active { background: #151f30; color: #c8d8e8; border-color: #3a5068; }
    .speed-btn:hover  { background: #121a28; }

    #day-counter {
      margin-left: auto;
      font-size: 7px;
      color: #7a9ab8;
      white-space: nowrap;
    }

    /* ─── Zoom controls ──────────────────────────────── */
    #zoom-row {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 4px;
      border-top: 1px solid #111a24;
    }
    #zoom-row-label { font-size: 5px; color: #3a5068; }
    #zoom-label     { font-size: 5px; color: #4a6580; min-width: 32px; }
    .zoom-btn {
      background: #0a0f18;
      color: #7a9ab8;
      border: 1px solid #1e2d40;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 3px 8px;
      cursor: pointer;
      line-height: 1;
    }
    .zoom-btn:hover { background: #1a2a3a; color: #c8d8e8; }

    /* ─── Scrubber ───────────────────────────────────── */
    #scrubber-row { display: none; padding: 2px 0; }
    #scrubber {
      width: 100%;
      height: 4px;
      accent-color: #F97316;
      cursor: pointer;
      opacity: 0.7;
    }
    #scrubber:hover { opacity: 1; }

    /* ─── Mobility curve chart ───────────────────────── */
    #chart-section {
      padding: 4px 0;
    }

    #mobility-curve-chart {
      border: 1px solid #10181f;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    /* ─── Agent grid ─────────────────────────────────── */
    #agent-grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 2px;
      padding: 4px;
      background: #080c14;
      border: 1px solid #10181f;
      border-radius: 4px;
    }

    .agent-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2px 1px;
      border: 1px solid #1e2d40;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.1s;
    }
    .agent-cell:hover { border-color: #fff; }
    .agent-cell-emoji { font-size: 10px; line-height: 1; }
    .agent-cell-name  { font-size: 4px; color: #7a9ab8; line-height: 1.2; margin-top: 1px; }

    /* ─── Hint ───────────────────────────────────────── */
    #hint {
      display: none;
      font-size: 5px;
      color: #2a3a4a;
      padding: 2px 2px 0;
      letter-spacing: 1px;
    }

    /* ─── Loading / Error ────────────────────────────── */
    #loading {
      text-align: center;
      font-size: 8px;
      color: #4a6580;
      padding: 60px 20px;
      animation: blink 1.1s step-end infinite;
    }
    #error-msg {
      display: none;
      text-align: center;
      font-size: 7px;
      color: #f87171;
      padding: 40px 20px;
      line-height: 2;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── Floating tooltip ───────────────────────────── */
    #agent-tooltip {
      display: none;
      position: fixed;
      pointer-events: none;
      background: #0d1520ee;
      border: 1px solid #1e2d40;
      padding: 4px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: #c8d8e8;
      line-height: 1.8;
      white-space: nowrap;
      z-index: 9999;
    }
    #agent-tooltip .tt-name { color: #e2e8f0; font-size: 7px; }
    #agent-tooltip .tt-health { margin-left: 6px; }

    .ui-tip {
      display: none;
      position: fixed;
      pointer-events: none;
      background: #0d1520ee;
      border: 1px solid #1e2d40;
      padding: 4px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #7a9ab8;
      line-height: 1.8;
      white-space: nowrap;
      z-index: 10000;
      max-width: 280px;
    }

    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 1200px) {
      #app { width: 100%; max-width: 1160px; }
      #game-row { flex-wrap: wrap; }
      #game-container { width: 100%; }
      #game-container canvas { width: 100% !important; height: auto !important; }
      #bio-panel { width: 100%; min-height: auto; border-left: 1px solid #1e2d40; border-top: none; max-height: 260px; }
      .bio-placeholder { padding-top: 20px; }
    }

    @media (max-width: 768px) {
      body { padding: 8px 4px 20px; }
      #header-top { flex-direction: column; gap: 4px; }
      #world-name { font-size: 9px; }
      #current-model-name { font-size: 11px; }
      #infection-level { font-size: 10px; }
      #controls { gap: 6px; padding: 6px 2px; }
      .ctrl-btn { font-size: 8px; padding: 8px 12px; }
      .speed-btn { font-size: 6px; padding: 6px 8px; }
      #day-counter { font-size: 7px; margin-left: 0; width: 100%; text-align: center; order: -1; }
      #agent-grid { grid-template-columns: repeat(10, 1fr); }
      #hint { display: none !important; }
      #bio-panel { max-height: 200px; padding: 10px; }
      .ui-tip { display: none !important; }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ─── Header ─────────────────────────────────────── -->
  <div id="header">
    <div id="header-top">
      <span id="world-name">DEWBERRY HOLLOW</span>
      <span id="subtitle">MOBILITY CURVE PROBE</span>
    </div>

    <div id="model-display">
      <span id="current-model-name">—</span>
      <span id="current-model-detail">—</span>
      <span id="infection-level">Infection: 0.0%</span>
      <span id="agent-counts">Out: — · Home: —</span>
    </div>
  </div>

  <!-- ─── Model selector ────────────────────────────── -->
  <div id="model-selector-row">
    <label for="model-select">MODEL</label>
    <select id="model-select"></select>
  </div>

  <div id="loading">LOADING TOWN...</div>
  <div id="error-msg"></div>

  <!-- ─── Game + Bio panel ───────────────────────────── -->
  <div id="game-row">
    <div id="game-container"></div>
    <div id="bio-panel">
      <div class="bio-placeholder">CLICK OR HOVER<br>AN AGENT<br>TO VIEW BIO<br>&amp; REASONING</div>
    </div>
  </div>

  <!-- ─── Controls ───────────────────────────────────── -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-play-pause">▶ PLAY</button>

    <div id="speed-group">
      <span id="speed-label">SPD</span>
      <button class="speed-btn"        data-speed="0.5">½×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn"        data-speed="2">2×</button>
      <button class="speed-btn"        data-speed="4">4×</button>
    </div>

    <div id="day-counter">—</div>
  </div>

  <!-- ─── Zoom ───────────────────────────────────────── -->
  <div id="zoom-row">
    <span id="zoom-row-label">ZOOM</span>
    <button class="zoom-btn" id="btn-zoom-out">−</button>
    <button class="zoom-btn" id="btn-zoom-reset">⌂</button>
    <button class="zoom-btn" id="btn-zoom-in">+</button>
    <span id="zoom-label">30%</span>
    <span style="font-size:5px;color:#2a3a4a;margin-left:8px">drag/arrows to pan · scroll to zoom</span>
  </div>

  <!-- ─── Scrubber ───────────────────────────────────── -->
  <div id="scrubber-row">
    <input type="range" id="scrubber" min="0" max="39" value="0">
  </div>

  <!-- ─── Mobility Curve Chart ───────────────────────── -->
  <div id="chart-section">
    <div id="mobility-curve-chart" style="width:1156px;height:260px"></div>
  </div>

  <!-- ─── Model Breakdown Panel ──────────────────────── -->
  <div id="model-breakdown" style="width:1156px;margin-top:8px"></div>

  <!-- ─── Concordance Chart (stacked area) ──────────── -->
  <div id="concordance-chart" style="width:1156px;margin-top:8px;position:relative"></div>

  <!-- ─── Concordance 6-line (comparison) ──────────── -->
  <div id="concordance-6line" style="width:1156px;margin-top:8px;position:relative"></div>

  <!-- ─── Concordance 3-line (comparison) ──────────── -->
  <div id="concordance-3line" style="width:1156px;margin-top:8px;position:relative"></div>

  <!-- ─── Agent Grid ─────────────────────────────────── -->
  <div id="agent-grid"></div>

  <div id="hint">
    [SPACE] play/pause &nbsp;&nbsp; [SHIFT+←→] step &nbsp;&nbsp; [←→↑↓] pan &nbsp;&nbsp; click agent to follow &nbsp;&nbsp; [ESC] unfollow
  </div>

</div><!-- #app -->
<div id="agent-tooltip"></div>
<div class="ui-tip" id="ui-tip"></div>

<script>
  // Populate model selector dropdown (grouped by provider)
  (function() {
    const select = document.getElementById('model-select');
    if (!select) return;

    const providers = ['anthropic', 'openai', 'gemini'];
    const labels = { anthropic: 'Anthropic', openai: 'OpenAI', gemini: 'Gemini' };

    providers.forEach(provider => {
      const group = document.createElement('optgroup');
      group.label = labels[provider];
      CONFIG.MODELS.forEach((m, idx) => {
        if (m.provider !== provider) return;
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = m.label;
        opt.style.color = m.color;
        group.appendChild(opt);
      });
      select.appendChild(group);
    });
  })();

  // Show zoom row after Phaser boots
  window.addEventListener('load', () => {
    setTimeout(() => {
      const zr = document.getElementById('zoom-row');
      if (zr) zr.style.display = 'flex';
    }, 800);
  });
</script>
<script src="town.js"></script>
</body>
</html>
